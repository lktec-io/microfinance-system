# ─────────────────────────────────────────────────────────────
#  Nginx config for Microfinance Management System
#  Place in: /etc/nginx/sites-available/microfinance
#  Symlink:  ln -s /etc/nginx/sites-available/microfinance /etc/nginx/sites-enabled/
# ─────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;

    # Redirect HTTP → HTTPS (uncomment when SSL is set up)
    # return 301 https://$host$request_uri;

    root /var/www/microfinance/client/dist;
    index index.html;

    # ── Gzip ────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/json
               application/javascript application/x-javascript
               text/xml application/xml application/xml+rss;

    # ── Security Headers ─────────────────────────────────────
    add_header X-Frame-Options         "SAMEORIGIN"    always;
    add_header X-XSS-Protection        "1; mode=block" always;
    add_header X-Content-Type-Options  "nosniff"       always;
    add_header Referrer-Policy         "no-referrer-when-downgrade" always;

    # ── API proxy → Node.js ──────────────────────────────────
    location /api/ {
        proxy_pass         http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade      $http_upgrade;
        proxy_set_header   Connection   'upgrade';
        proxy_set_header   Host         $host;
        proxy_set_header   X-Real-IP    $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # ── React SPA (catch-all) ────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Static assets cache ───────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

